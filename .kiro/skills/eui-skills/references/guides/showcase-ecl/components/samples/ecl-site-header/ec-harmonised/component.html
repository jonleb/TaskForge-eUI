<ecl-site-header
    siteName="News, policies, information and services"
    (logoClick)="onLogoClick($event)">

    <div eclSiteHeaderEnvironment>Environment</div>

    <ecl-site-header-action>
        <ecl-site-header-login
            [isLoggedIn]="isLoggedIn"
            (login)="onLogin($event)">
            <p eclSiteHeaderLoginDescription>
                {{ 'ecl.site-header.LOGGED-IN-AS' | translate }} John Doe
            </p>
            <hr eclSiteHeaderLoginSeparator />
            <a eclLink variant="standalone" href="#" (click)="onLogout($event)">
                {{ 'ecl.site-header.LOGOUT' | translate }}
            </a>
        </ecl-site-header-login>

        <ecl-site-header-language
            (languageClick)="onLanguageClick($event)">
        </ecl-site-header-language>

        <ecl-site-header-search (search)="onSearch($event)"></ecl-site-header-search>
    </ecl-site-header-action>

    <ecl-site-header-notification>
        <ecl-notification variant="info" isCloseable>
            <div eclNotificationTitle>Information notification</div>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam accumsan semper lorem, ac mollis lacus tincidunt eu.
            Duis scelerisque diam eu tempus fringilla.
        </ecl-notification>
    </ecl-site-header-notification>

        <ecl-menu-item label="Home" routerLink="/"></ecl-menu-item>

                <ecl-menu-mega-item label="Item 1.4" routerLink="/"></ecl-menu-mega-item>
                <ecl-menu-mega-item label="Item 1.5" routerLink="/"></ecl-menu-mega-item>
