<div>
  <ecl-file id="ecl-file-th" langId="ecl-file-th-lang"
    description="Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer quis lorem tellus. Nullam sollicitudin suscipit diam, ac blandit ipsum tempor consectetur. Duis vitae pulvinar turpis. Donec maximus pharetra ex a ultricies."
    language="English" labelInfo="highlighted" [detailMeta]="['META INFO', 'DD Month YYYY']" meta="(16.2 MB - PDF)">
    <div eclFileTitle id="ecl-file-th-title">State of the Union 2018 brochure</div>
    <picture eclFilePicture><img eclFileImage src="https://inno-ecl.s3.amazonaws.com/media/examples/example-image.jpg"
        alt="thumbnail" /></picture>
    <a eclLink variant="standalone" href="./assets/images/landing-page/portfolio/thumbnails/1.jpg" eclFileDownload
      (click)="onItemDownload($event)" download="1.jpg"
      aria-labelledby="ecl-file-th-link-label ecl-file-th-title ecl-file-th-lang">
      <span eclLinkLabel id="ecl-file-th-link-label">Download</span>
      <ecl-icon icon="download" size="fluid"></ecl-icon>
    </a>
    <ecl-file-items (toggle)="onToggle($event)">
      <ecl-file-item eclTitle="български" titleId="ecl-file-th-0-lang" lang="bg" meta="(15.8 MB - PDF)">
        <a eclLink variant="standalone" href="./assets/images/landing-page/portfolio/thumbnails/2.jpg" eclFileTranslationDownload
          (click)="onItemDownload($event)" download="2.jpg"
          aria-labelledby="ecl-file-th-0-link-label ecl-file-th-title ecl-file-th-0-lang">
          <span eclLinkLabel id="ecl-file-th-0-link-label">Download</span>
          <ecl-icon icon="download" size="fluid"></ecl-icon>
        </a></ecl-file-item>
      <ecl-file-item eclTitle="español" titleId="ecl-file-th-1-lang" lang="es" meta="(15.8 MB - PDF)">
        <a eclLink variant="standalone" href="./assets/images/landing-page/portfolio/thumbnails/3.jpg" eclFileTranslationDownload
          (click)="onItemDownload($event)" download="3.jpg"
          aria-labelledby="ecl-file-th-1-link-label ecl-file-th-title ecl-file-th-1-lang">
          <span eclLinkLabel id="ecl-file-th-1-link-label">Download</span>
          <ecl-icon icon="download" size="fluid"></ecl-icon>
        </a></ecl-file-item>
      <ecl-file-item eclTitle="français" titleId="ecl-file-th-2-lang" lang="fr" meta="(15.8 MB - PDF)">
        <a eclLink variant="standalone" href="./assets/images/landing-page/portfolio/thumbnails/4.jpg" eclFileTranslationDownload
          (click)="onItemDownload($event)" download="4.jpg">
          <span eclLinkLabel id="ecl-file-th-2-link-label">Download</span>
          <ecl-icon icon="download" size="fluid"></ecl-icon>
        </a></ecl-file-item>
    </ecl-file-items>
  </ecl-file>
</div>
