<h6 class="section-title">Default</h6>
<p>
    Please note, no need to provide <code>iconSet</code> property for default icons, its implicit,
    yet it can be provided if necesary
</p>
<div>
    <ecl-icon icon="audio" size="m"></ecl-icon>

</div>
