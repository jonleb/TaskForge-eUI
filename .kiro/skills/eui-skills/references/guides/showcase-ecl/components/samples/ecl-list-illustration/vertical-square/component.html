<ecl-list-illustration isZebra>
    @for (text of texts; track $index) {
    <ecl-list-illustration-item [eclTitle]="text.title" [eclValue]="text.value">
        <picture eclListIllustrationPicture isSquare>
            <img eclListIllustrationImage
                 size="m"
                 src="https://inno-ecl.s3.amazonaws.com/media/examples/example-image.jpg"
                 alt="Image alternative text">
        </picture>
        {{ text.description }}
    </ecl-list-illustration-item>
    }
</ecl-list-illustration>
