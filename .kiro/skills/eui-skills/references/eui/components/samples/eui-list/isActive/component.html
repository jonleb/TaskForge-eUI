<p class="eui-u-text-paragraph">A list item can be set (dynamically) to be active by using the <code class="eui-u-text-code">isActive</code> input property.</p>
<div class="row">
    <div class="col-md-4">
        <div class="doc-sample-section-title">Unordered list (ul &gt; li)</div>
        <ul euiList>
            <li euiListItem>
                <span euiLabel>List item 1</span>
            </li>
            <li euiListItem>
                <span euiLabel>List item 2</span>
            </li>
            <li euiListItem isActive>
                <span euiLabel>List item 3 (active)</span>
            </li>
        </ul>
    </div>
    <div class="col-md-4">
        <div class="doc-sample-section-title">Dynamic list</div>
        <ul euiList>
            @for (listItem of listItems; track $index) {
                <li euiListItem [isActive]="listItem.active">
                    <span euiLabel>{{ listItem.label }}</span>
                </li>
            }
        </ul>
    </div>
</div>
