<div class="eui-table__scrollable-wrapper">
    <table euiTable [data]="data">
        <ng-template euiTemplate="header">
            <tr>
                <th aria-label="Row index">#</th>
                <th>Country</th>
                <th>Year</th>
                <th>ISO</th>
                <th>Population</th>
                <th>Capital city</th>
            </tr>
        </ng-template>
        <ng-template let-row let-index="index" euiTemplate="body">
            <tr>
                <td>{{ index + 1 }}</td>
                <td>{{ row.country }}</td>
                <td>{{ row.year }}</td>
                <td>{{ row.iso }}</td>
                <td>{{ row.population | number }}</td>
                <td>{{ row.capital }}</td>
            </tr>
        </ng-template>
    </table>
</div>
