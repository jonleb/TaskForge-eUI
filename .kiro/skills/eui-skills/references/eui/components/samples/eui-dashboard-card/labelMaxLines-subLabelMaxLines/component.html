<div class="doc-sample-section-title">with labelMaxLines and subLabelMaxLines set (from 1 to 5 lines max)</div>

    <div class="col-md-4">
        <eui-dashboard-card
            label="VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL"
            subLabel="This is a very long sub label of the card This is a very long sub label of the card This is a very long sub label of the card This is a very long sub label of the card This is a very long sub label of the card"
            [labelMaxLines]="3">
            <button euiButton euiInfo euiOutline euiSizeS>more</button>
        </eui-dashboard-card>
    </div>
    <div class="col-md-4">
        <eui-dashboard-card
            label="VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL"
            subLabel="This is a very long sub label of the card This is a very long sub label of the card This is a very long sub label of the card This is a very long sub label of the card This is a very long sub label of the card"
            [subLabelMaxLines]="3">
            <button euiButton euiInfo euiOutline euiSizeS>more</button>
        </eui-dashboard-card>
    </div>

        <eui-dashboard-card label="VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL VERY LONG LABEL"
