<div class="row">
    <div class="col-md-6">
        <div class="doc-sample-section-title">Root level</div>
        <eui-tree #compInstance [nodes]="treeData" (nodeToggle)="onNodeToggle($event)"></eui-tree>
    </div>
    <div class="col-md-6">
        <div class="eui-showcase-demo">
            <div class="code" style="max-height: 25rem; overflow-y: auto;">

                <eui-fieldset label="Tree Data" isExpandable>
                    <pre>{{ compInstance.getProcessedNodes() | json }}</pre>
                </eui-fieldset>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-md-6">
        <div class="doc-sample-section-title">Deeper levels</div>
        <eui-tree #compInstance2 [nodes]="treeData" (nodeToggle)="onNodeToggle2($event)"></eui-tree>
    </div>
    <div class="col-md-6">
        <div class="eui-showcase-demo">
            <div class="code" style="max-height: 25rem; overflow-y: auto;">

                <eui-fieldset label="Tree Data" isExpandable>
                    <pre>{{ compInstance2.getProcessedNodes() | json }}</pre>
                </eui-fieldset>
            </div>
        </div>
    </div>
</div>
