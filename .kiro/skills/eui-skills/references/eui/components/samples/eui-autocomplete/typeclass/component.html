<eui-alert>
    When <code class="eui-u-text-code">typeClass</code> is used with chips, chip will have the color defined
    by <code class="eui-u-text-code">typeClass</code> at item level. <code
    class="eui-u-text-code">typeClass</code> possible values: primary, secondary, info, success, warning,
    danger.
</eui-alert>

<div class="doc-sample-section-title">Without chips</div>
<eui-autocomplete [autocompleteData]="autocompleteData"></eui-autocomplete>

<div class="doc-sample-section-title">With chips</div>
<eui-autocomplete [autocompleteData]="autocompleteData" [hasChips]="true"></eui-autocomplete>
