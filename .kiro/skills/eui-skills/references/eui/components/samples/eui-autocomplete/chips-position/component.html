<eui-alert>When chips position is set on 'inside', Backspace key will allow the user to delete the last chip.</eui-alert>

<div class="doc-sample-section-title">Chips position top</div>
<eui-autocomplete [autocompleteDataSelected]="autocompleteDataSelected" [autocompleteData]="autocompleteData"
                  [chipsPosition]="'top'" [hasChips]="true"></eui-autocomplete>

<div class="doc-sample-section-title">Chips position bottom</div>
<eui-autocomplete [autocompleteDataSelected]="autocompleteDataSelected" [autocompleteData]="autocompleteData"
                  [chipsPosition]="'bottom'" [hasChips]="true"></eui-autocomplete>

<div class="doc-sample-section-title">Chips position inside</div>
<eui-autocomplete [autocompleteDataSelected]="autocompleteDataSelected" [autocompleteData]="autocompleteData"
                  [chipsPosition]="'inside'" [hasChips]="true"></eui-autocomplete>
