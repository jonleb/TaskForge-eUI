<eui-tabs #euiTabs [activeTabIndex]="activeTabIndex" (tabClick)="onTabClicked($event)">
    @for (tab of tabs; let i = $index; track tab) {
        <eui-tab #tabItem [id]="tab.id">
            <eui-tab-header>
                <eui-tab-header-label>
                   {{ tab.tabLabel }}
                </eui-tab-header-label>
                <eui-tab-header-sub-label>
                    {{ tab.tabSubLabel }}
                </eui-tab-header-sub-label>
            </eui-tab-header>
            <eui-tab-body hasNoContentPadding></eui-tab-body>
        </eui-tab>
    }
</eui-tabs>

<div class="eui-u-p-s">
    <router-outlet></router-outlet>
</div>
