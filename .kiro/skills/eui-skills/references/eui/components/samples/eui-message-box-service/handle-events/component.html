<p class="eui-u-text-paragraph">Closing a Message Box window can be managed in your component using the following input options:</p>
<div class="eui-u-ml-m">
    <li>isHandleCloseOnDismiss</li>
    <li>isHandleCloseOnClose</li>
    <li>isHandleCloseOnAccept</li>
</div>
<p class="eui-u-text-paragraph">You need to call the <code class="eui-u-text-code">closeMessageBox()</code> method to effectively close the Message Box window.</p>

<button euiButton type="button" (click)="openWithService()" aria-haspopup="dialog">Open Message Box</button>
