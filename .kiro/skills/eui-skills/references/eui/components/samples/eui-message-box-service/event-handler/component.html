<table class="eui-table-default eui-table-default--compact eui-u-mb-m">
    <thead>
        <tr>
            <th>Event handler</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>init</td>
            <td>Triggered when the message box is inited.</td>
        </tr>
        <tr>
            <td>close</td>
            <td>Triggered when the message box is closed.</td>
        </tr>
        <tr>
            <td>open</td>
            <td>Triggered when the message box is opened.</td>
        </tr>
        <tr>
            <td>accept</td>
            <td>Triggered when the accept button is clicked.</td>
        </tr>
        <tr>
            <td>dismiss</td>
            <td>Triggered when the dismiss button is clicked.</td>
        </tr>
    </tbody>
</table>

<button euiButton type="button" (click)="openWithService()" aria-haspopup="dialog">Open Message Box</button>
