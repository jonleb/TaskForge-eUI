<eui-datepicker [minDate]="minDate"></eui-datepicker>

<div class="doc-sample-section-title">With Max Date set to 5 days after</div>

<eui-datepicker [minDate]="minDate" [maxDate]="maxDate"></eui-datepicker>

<eui-datepicker [datepickerFilter]="myFilter"></eui-datepicker>
