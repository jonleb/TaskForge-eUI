<p class="eui-u-text-paragraph">Disabled buttons are displayed using the <code class="eui-u-text-code">euiDisabled</code> input option which are not accessible.</p>

<div class="doc-sample-section-title">Default disabled buttons</div>
<p class="eui-u-text-paragraph">Using combined <code class="eui-u-text-code">euiButton euiDisabled</code> input options</p>

<div class="eui-u-flex eui-u-flex-wrap eui-u-mt-m">
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s">Default</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiPrimary>Primary</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiSecondary>Secondary</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiInfo>Info</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiSuccess>Success</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiWarning>Warning</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiDanger>Danger</button>
    <button euiButton euiDisabled class="eui-u-mr-s eui-u-mb-s" euiCTAButton>Call to action</button>
</div>


<div class="doc-sample-section-title">Outlined disabled buttons</div>
