<div class="row">
    <div clas="col-md-6">
        <eui-card euiNoContentPadding>
            <eui-card-header>
                <eui-card-header-title>
                    Timeline
                </eui-card-header-title>
            </eui-card-header>
            <eui-card-content>
                <div class="eui-u-flex eui-u-p-s">

                    <eui-timeline>
                        <eui-timeline-item date="01/01/2021" label="default" subLabel="sub label content of the timeline item"></eui-timeline-item>
                        <eui-timeline-item date="01/01/2021" euiPrimary label="primary" subLabel="sub label content of the timeline item"></eui-timeline-item>
                        <eui-timeline-item date="01/01/2021" euiInfo label="info" subLabel="sub label content of the timeline item"></eui-timeline-item>
                        <eui-timeline-item date="01/01/2021" euiSuccess label="success" subLabel="sub label content of the timeline item"></eui-timeline-item>
                        <eui-timeline-item date="01/01/2021" euiWarning label="warning" subLabel="sub label content of the timeline item"></eui-timeline-item>
                        <eui-timeline-item date="01/01/2021" euiDanger label="danger" subLabel="sub label content of the timeline item"></eui-timeline-item>
                    </eui-timeline>

                </div>
            </eui-card-content>
        </eui-card>
    </div>
</div>
