<eui-timeline>
    <eui-timeline-item date="01/07/2021" euiSuccess>
        <eui-chip euiSuccess euiSizeS isSquared><span euiLabel>FINALIZED</span></eui-chip>
        <div class="eui-u-mt-m eui-u-c-neutral">Action <strong>REGISTERED</strong> by <strong>John DOE</strong></div>
        <div class="eui-u-flex">
            <eui-icon-svg icon="arrow-bend-down-right:regular" fillColor="success" />
            <span class="eui-u-ml-xs">All features are validated and ready to be registered.</span>
        </div>
    </eui-timeline-item>

    <eui-timeline-item date="01/06/2021" euiDanger>
        <eui-chip euiDanger euiSizeS isSquared><span euiLabel>FINAL VALIDATION</span></eui-chip>
        <div class="eui-u-mt-m eui-u-c-neutral">Action <strong>VALIDATED</strong> by <strong>Arena GARCIA</strong></div>
        <div class="eui-u-flex">
            <eui-icon-svg icon="arrow-bend-down-right:regular" fillColor="danger" />
            <span class="eui-u-ml-xs">Please, fill in all the required fields!</span>
        </div>
    </eui-timeline-item>

    @if (showMore) {
        <eui-timeline>
            <eui-timeline-item date="01/05/2021"
                                dateStyleClass="eui-u-c-primary"
                                time="12:00"
                                timeStyleClass="eui-u-c-primary"
                                label="default"
                                subLabel="sub label content of the timeline item">
            </eui-timeline-item>
            <eui-timeline-item date="01/04/2021"
                                dateStyleClass="eui-u-c-primary"
                                time="12:00"
                                timeStyleClass="eui-u-c-primary"
                                label="default"
                                subLabel="sub label content of the timeline item">
            </eui-timeline-item>
        </eui-timeline>
    }

    <eui-timeline-item isGroup>
        <button euiButton euiSizeS euiPrimary (click)="toggleShowMore($event)">
            <span euiLabel>
                @if (!showMore) {
                    <span>Show 2 more items</span>
                }
                @if (showMore) {
                    <span>Hide 2 items</span>
                }
            </span>
            <eui-icon-svg [icon]="showMore ? 'eui-chevron-up' : 'eui-chevron-down'" class="eui-u-ml-xs"></eui-icon-svg>
        </button>
    </eui-timeline-item>

    <eui-timeline-item date="01/01/2021" euiInfo>
        <eui-chip euiInfo euiSizeS isSquared><span euiLabel>START PROCESS</span></eui-chip>
        <div class="eui-u-mt-m eui-u-c-neutral">Action <strong>STARTED</strong> by <strong>Jean DUPONT</strong></div>
    </eui-timeline-item>
</eui-timeline>
