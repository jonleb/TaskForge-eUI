The optional <code class="eui-u-text-code">pageSize</code> input property allows to define how many data
entries to display per page (default: 10).<br>
The optional <code class="eui-u-text-code">pageSizeOptions</code> input property allows to set the list of
items that can be selected per page (default: [5, 10, 25, 50, 100]).<br/>
The following sample uses: [5, 10, 50] values.
<br>

<eui-paginator [length]="dataSource.length" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions"></eui-paginator>
