<eui-alert>By default <code class="eui-u-text-code">eui-date-range-selector</code> listens to the locale specified at the <code class="eui-u-text-code"><a href="https://eui.ecdevops.eu/eui-showcase-ux-components-21.x/showcase-dev-guide/docs/10-services/locale">Locale Service</a></code> and applies the corresponding format. Bellow you can find also how to force a desired format in your app.</eui-alert>
<br>
<div class="doc-sample-section-title">Forcing dd/mm/yyyy format</div>
<eui-date-range-selector appDateFormat1 [startDateDefaultValue]="startDate" [endDateDefaultValue]="endDate"></eui-date-range-selector><br>

<div class="doc-sample-section-title">Forcing yyyy/mm/dd format</div>
<eui-date-range-selector appDateFormat2 [startDateDefaultValue]="startDate" [endDateDefaultValue]="endDate"></eui-date-range-selector>
