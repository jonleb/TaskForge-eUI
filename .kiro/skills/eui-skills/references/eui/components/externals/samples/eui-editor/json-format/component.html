<form [formGroup]="form">
    <eui-editor formControlName="jsonContent"
        [placeholder]="placeholder"
        format="json">
    </eui-editor>
</form>
<div class="eui-showcase-demo eui-u-mt-m">
    <div class="doc-sample-section-title">Editor's contents</div>
    <div class="code" tabindex="0">
        <pre class="eui-u-text-pre" style="white-space: pre-wrap;">{{ form.get('jsonContent').value }}</pre>
    </div>
</div>
