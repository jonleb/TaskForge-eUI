<p class="eui-u-text-paragraph">The <code class="eui-u-text-code">euiResizable</code> directive can also be applied to the <code class="eui-u-text-code">eui-page-column</code> component to allow to resize the column(s) content.</p>
<p class="eui-u-text-paragraph">For more information and demo, see the page sample from Layout components > <a class="eui-u-text-link" routerLink="/style-guide/layout-components/eui-page-column-resizable">eui-page-columns resizable</a>.</p>
