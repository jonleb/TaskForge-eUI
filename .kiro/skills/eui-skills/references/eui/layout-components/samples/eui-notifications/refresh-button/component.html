<eui-alert>This sample shows how to hide the 'refresh' button in the header of the overlay.</eui-alert><br/>

<eui-toolbar>
    <eui-toolbar-items>
        <eui-toolbar-item>
            <eui-notifications [items]="items" [isShowRefreshButton]="false"/>
        </eui-toolbar-item>
    </eui-toolbar-items>
</eui-toolbar>
