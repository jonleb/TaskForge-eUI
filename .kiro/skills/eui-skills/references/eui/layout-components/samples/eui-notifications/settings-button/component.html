<eui-alert>This sample shows how to hide the 'settings' button in the header of the overlay.</eui-alert><br/>

<eui-toolbar>
    <eui-toolbar-items>
        <eui-toolbar-item>
            <eui-notifications [items]="items" [isShowSettingsButton]="false"/>
        </eui-toolbar-item>
    </eui-toolbar-items>
</eui-toolbar>
