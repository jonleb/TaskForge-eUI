<eui-alert>This sample shows how to hide the 'View all' link in the overlay footer.</eui-alert><br/>

<eui-toolbar>
    <eui-toolbar-items>
        <eui-toolbar-item>
            <eui-notifications [items]="items" [isShowViewAllAction]="false"/>
        </eui-toolbar-item>
    </eui-toolbar-items>
</eui-toolbar>
