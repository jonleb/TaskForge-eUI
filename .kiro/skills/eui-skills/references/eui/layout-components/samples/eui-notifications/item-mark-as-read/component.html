<eui-alert>This sample shows how to hide the 'mark as read' link at notification item level.</eui-alert><br/>

<eui-toolbar>
    <eui-toolbar-items>
        <eui-toolbar-item>
            <eui-notifications [items]="items" [isShowMarkAsRead]="false"/>
        </eui-toolbar-item>
    </eui-toolbar-items>
</eui-toolbar>
