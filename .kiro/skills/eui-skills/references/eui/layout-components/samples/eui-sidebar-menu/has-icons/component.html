<p class="eui-u-text-paragraph">
    The <code class="eui-u-text-code">hasIcons</code> input option allows to display the icons when passed with the iconSvgName property.
    When <code class="eui-u-text-code">urlExternal</code> with <code class="eui-u-text-code">urlExternalTarget</code> are used, 
    an extra icon is automatically appended after the menu item link in order to visualize this is an external link.
